<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="萌新段位徽章">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#4caf50" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#2e7d32" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f1" cx="45%" cy="38%" r="62%">
      <stop offset="0%"  stop-color="#263a28"/>
      <stop offset="55%" stop-color="#18261a"/>
      <stop offset="100%" stop-color="#0d140f"/>
    </radialGradient>
    <linearGradient id="b1" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%"   stop-color="#7aaa7a"/><stop offset="30%" stop-color="#3d6b3d"/>
      <stop offset="55%"  stop-color="#8fc08f"/><stop offset="80%" stop-color="#2a4d2a"/>
      <stop offset="100%" stop-color="#5c8a5c"/>
    </linearGradient>
    <linearGradient id="sh1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 外光晕 -->
  <circle cx="100" cy="100" r="96" fill="url(#g1)"/>

  <!-- 金属边框 5px -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#b1)" stroke-width="5"/>

  <!-- 底盘 -->
  <circle cx="100" cy="100" r="79" fill="url(#f1)"/>

  <!-- ═══ 核心：人体剪影 + 内核 ═══ -->
  <g transform="translate(100, 82)">
    <!-- 人体头部剪影（纯弧线，有机） -->
    <path d="M0,-42 C22,-42 38,-30 42,-10 C44,6 40,18 30,26
             C22,34 12,40 0,42 C-12,40 -22,34 -30,26
             C-40,18 -44,6 -42,-10 C-38,-30 -22,-42 0,-42 Z"
          fill="#0d140f" fill-opacity="0.6" stroke="#4caf50" stroke-width="1.2" stroke-opacity="0.25"/>

    <!-- 肩线 -->
    <path d="M-30,42 Q-44,48 -52,56 M30,42 Q44,48 52,56"
          fill="none" stroke="#4caf50" stroke-width="1" stroke-opacity="0.2" stroke-linecap="round"/>

    <!-- L1 内核：单点微光（1个节点，最简） -->
    <circle cx="0" cy="2" r="4" fill="#a5d6a7" opacity="0.6"/>
    <circle cx="0" cy="2" r="2" fill="#c8e6c9" opacity="0.85"/>
    <circle cx="0" cy="2" r="1" fill="#fff" opacity="0.7"/>

    <!-- 微光环 -->
    <circle cx="0" cy="2" r="8" fill="none" stroke="#a5d6a7" stroke-width="0.6" opacity="0.2"/>
  </g>

  <!-- 表面高光 -->
  <ellipse cx="88" cy="48" rx="38" ry="19" fill="url(#sh1)" transform="rotate(-15 88 48)"/>

  <!-- 粒子 L1=3 -->
  <circle cx="155" cy="40" r="1.8" fill="#a5d6a7" opacity="0.35"/>
  <circle cx="42"  cy="130" r="1.5" fill="#81c784" opacity="0.25"/>
  <circle cx="148" cy="148" r="1.2" fill="#a5d6a7" opacity="0.2"/>
</svg>
