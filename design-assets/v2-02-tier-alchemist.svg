<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="炼金术士段位徽章">
  <defs>
    <!-- 紫水晶材质渐变 -->
    <radialGradient id="al-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ab47bc" stop-opacity="0.20"/>
      <stop offset="50%" stop-color="#6a1b9a" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="al-face" cx="40%" cy="35%" r="65%">
      <stop offset="0%"  stop-color="#2a1540" />
      <stop offset="50%" stop-color="#1a0a2a" />
      <stop offset="100%" stop-color="#0d0418" />
    </radialGradient>
    <linearGradient id="al-bezel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#c991d9" />
      <stop offset="25%"  stop-color="#7b1fa2" />
      <stop offset="50%"  stop-color="#e1bee7" />
      <stop offset="75%"  stop-color="#4a148c" />
      <stop offset="100%" stop-color="#ab47bc" />
    </linearGradient>
    <radialGradient id="al-crystal" cx="50%" cy="40%" r="50%">
      <stop offset="0%"   stop-color="#e1bee7" stop-opacity="0.7"/>
      <stop offset="60%"  stop-color="#ab47bc" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#4a148c" stop-opacity="0.8"/>
    </radialGradient>
    <linearGradient id="al-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- L5: 外光晕 -->
  <circle cx="100" cy="100" r="96" fill="url(#al-glow)"/>

  <!-- L4: 星点阵装饰环（L6特有） -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#ab47bc" stroke-width="1" stroke-opacity="0.3" stroke-dasharray="3 12"/>
  <circle cx="100" cy="100" r="87" fill="none" stroke="#e1bee7" stroke-width="0.8" stroke-opacity="0.2" stroke-dasharray="3 12" stroke-dashoffset="5"/>

  <!-- L3: 金属边框环（L6=7px） -->
  <circle cx="100" cy="100" r="79" fill="none" stroke="url(#al-bezel)" stroke-width="7"/>

  <!-- L2: 徽章底盘 -->
  <circle cx="100" cy="100" r="73" fill="url(#al-face)"/>

  <!-- L1: 核心符号 — 哲人石晶体（六边形晶体结构） -->
  <g transform="translate(0, 0)">
    <!-- 晶体主体 — 六边形 -->
    <polygon points="100,44 134,68 134,108 100,134 66,108 66,68"
             fill="url(#al-crystal)" stroke="#e1bee7" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- 晶体内部折射面 -->
    <line x1="100" y1="44" x2="100" y2="134" stroke="#ffffff" stroke-width="1" opacity="0.2"/>
    <line x1="66" y1="88" x2="134" y2="88" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
    <line x1="83" y1="56" x2="83" y2="120" stroke="#ffffff" stroke-width="0.8" opacity="0.1"/>
    <line x1="117" y1="56" x2="117" y2="120" stroke="#ffffff" stroke-width="0.8" opacity="0.1"/>
    <!-- 中心亮点 -->
    <circle cx="100" cy="88" r="6" fill="#ffffff" opacity="0.3"/>
    <circle cx="100" cy="88" r="3" fill="#ffffff" opacity="0.6"/>
    <!-- 晶体顶部星冠 -->
    <polygon points="100,30 96,40 90,38 95,46 91,54 100,48 109,54 105,46 110,38 104,40"
             fill="#e1bee7" opacity="0.5"/>
  </g>

  <!-- L0: 表面高光 -->
  <ellipse cx="88" cy="48" rx="38" ry="20" fill="url(#al-shine)" transform="rotate(-15 88 48)"/>

  <!-- 粒子: L6 = 9颗 -->
  <circle cx="30"  cy="90"  r="2"   fill="#e1bee7" opacity="0.45"/>
  <circle cx="36"  cy="130" r="1.5" fill="#ce93d8" opacity="0.35"/>
  <circle cx="165" cy="55"  r="2.5" fill="#e1bee7" opacity="0.5"/>
  <circle cx="170" cy="100" r="1.8" fill="#ab47bc" opacity="0.35"/>
  <circle cx="155" cy="140" r="1.5" fill="#ce93d8" opacity="0.3"/>
  <circle cx="45"  cy="45"  r="2"   fill="#e1bee7" opacity="0.4"/>
  <circle cx="28"  cy="60"  r="1.2" fill="#ab47bc" opacity="0.25"/>
  <circle cx="162" cy="30"  r="1.5" fill="#ce93d8" opacity="0.3"/>
  <circle cx="148" cy="168" r="1.8" fill="#e1bee7" opacity="0.25"/>
</svg>
