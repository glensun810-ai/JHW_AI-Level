<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="炼金术士段位徽章">
  <defs>
    <radialGradient id="g6" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ab47bc" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#6a1b9a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f6" cx="45%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#201835"/><stop offset="55%" stop-color="#140d22"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </radialGradient>
    <linearGradient id="b6" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%" stop-color="#ce93d8"/><stop offset="25%" stop-color="#7b1fa2"/>
      <stop offset="50%" stop-color="#e1bee7"/><stop offset="75%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#ab47bc"/>
    </linearGradient>
    <linearGradient id="sh6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bloom6">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 外光晕 -->
  <circle cx="100" cy="100" r="96" fill="url(#g6)"/>

  <!-- 装饰环 L6 -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#ab47bc" stroke-width="1.2" stroke-opacity="0.25" stroke-dasharray="2.5 14"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#e1bee7" stroke-width="0.8" stroke-opacity="0.15" stroke-dasharray="2.5 14" stroke-dashoffset="6"/>

  <!-- 金属边框 7px -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#b6)" stroke-width="7"/>

  <!-- 底盘 -->
  <circle cx="100" cy="100" r="74" fill="url(#f6)"/>

  <!-- ═══ L6 融合态 · 极简 = 左弧线 + 右折线 + 中心融合 ═══ -->
  <g transform="translate(100, 85)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ── 左半球：纯弧线（生物神经网络） ── -->
    <path d="M-3,-1 C-16,-5 -28,-14 -26,-26" stroke="#ce93d8" stroke-width="2.2" opacity="0.7"/>
    <path d="M-3,3 C-16,7 -26,15 -22,25" stroke="#ce93d8" stroke-width="2.2" opacity="0.7"/>
    <path d="M-5,0 C-12,-4 -18,-10 -16,-18" stroke="#ab47bc" stroke-width="1.5" opacity="0.5"/>

    <!-- ── 右半球：45°折线（硅基PCB电路） ── -->
    <!-- 上支：中心→右→45°上折→直上→45°再折 -->
    <path d="M3,-2 L14,-2 L22,-10 L22,-24" stroke="#e1bee7" stroke-width="2" opacity="0.65"/>
    <!-- 下支 -->
    <path d="M3,4 L14,4 L20,10 L20,22" stroke="#e1bee7" stroke-width="2" opacity="0.65"/>
    <!-- 平行副线（PCB总线的标志性平行走线） -->
    <path d="M3,-5 L8,-5 L16,-13 L16,-20" stroke="#ce93d8" stroke-width="1.3" opacity="0.45"/>
    <path d="M3,7 L8,7 L14,13 L14,18" stroke="#ce93d8" stroke-width="1.3" opacity="0.45"/>

    <!-- ── 融合区：一条弧线穿越中线接触电路节点 ── -->
    <path d="M-8,-2 C-4,-8 2,-8 8,-4" stroke="#e1bee7" stroke-width="1.5" opacity="0.55"/>

    <!-- 正中分界线（也是融合线） -->
    <line x1="0" y1="-5" x2="0" y2="6" stroke="#ab47bc" stroke-width="0.5" opacity="0.35"/>

    <!-- ── 节点 ── -->
    <!-- 左：圆形突触节点 -->
    <g fill="#ce93d8">
      <circle cx="-26" cy="-26" r="2.5" opacity="0.7"/>
      <circle cx="-22" cy="25" r="2.5" opacity="0.7"/>
      <circle cx="-16" cy="-18" r="2" opacity="0.55"/>
    </g>
    <!-- 右：方形过孔焊点 -->
    <g fill="#e1bee7">
      <rect x="20" y="-26" width="4" height="4" rx="0.5" opacity="0.6"/>
      <rect x="18" y="20" width="4" height="4" rx="0.5" opacity="0.6"/>
      <rect x="14" y="-15" width="3.5" height="3.5" rx="0.5" opacity="0.45"/>
    </g>

    <!-- 融合区节点（过渡形态——圆角方形） -->
    <rect x="-3" y="-4" width="6" height="6" rx="2" fill="#e1bee7" opacity="0.6"/>

    <!-- 中心融合光核 -->
    <circle cx="0" cy="0" r="6" fill="#e1bee7" opacity="0.22" filter="url(#bloom6)"/>
    <circle cx="0" cy="0" r="2.8" fill="#e1bee7" opacity="0.8"/>
    <circle cx="0" cy="0" r="1.3" fill="#fff" opacity="0.9"/>
  </g>

  <!-- 表面高光 -->
  <ellipse cx="86" cy="46" rx="36" ry="18" fill="url(#sh6)" transform="rotate(-15 86 46)"/>

  <!-- 粒子 L6=9 -->
  <g fill="#e1bee7">
    <circle cx="28" cy="88" r="1.8" opacity="0.4"/>
    <circle cx="168" cy="52" r="2.2" opacity="0.45"/>
    <circle cx="172" cy="105" r="1.5" opacity="0.3"/>
    <circle cx="155" cy="145" r="1.8" opacity="0.28"/>
    <circle cx="42" cy="42" r="1.8" opacity="0.35"/>
    <circle cx="162" cy="28" r="1.5" opacity="0.28"/>
    <circle cx="35" cy="132" r="1.5" opacity="0.3"/>
    <circle cx="26" cy="58" r="1.2" opacity="0.22"/>
    <circle cx="148" cy="170" r="1.6" opacity="0.22"/>
  </g>
</svg>
