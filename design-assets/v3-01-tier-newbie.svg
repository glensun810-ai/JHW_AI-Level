<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="萌新段位徽章">
  <defs>
    <radialGradient id="nw3-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#4caf50" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#2e7d32" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nw3-face" cx="45%" cy="38%" r="62%">
      <stop offset="0%"  stop-color="#263a28" />
      <stop offset="55%" stop-color="#18261a" />
      <stop offset="100%" stop-color="#0d140f" />
    </radialGradient>
    <linearGradient id="nw3-bezel" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%"   stop-color="#7aaa7a" />
      <stop offset="30%"  stop-color="#3d6b3d" />
      <stop offset="55%"  stop-color="#8fc08f" />
      <stop offset="80%"  stop-color="#2a4d2a" />
      <stop offset="100%" stop-color="#5c8a5c" />
    </linearGradient>
    <radialGradient id="nw3-core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#a5d6a7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#66bb6a" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2e7d32" stop-opacity="0.8"/>
    </radialGradient>
    <linearGradient id="nw3-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- L5 外光晕 -->
  <circle cx="100" cy="100" r="96" fill="url(#nw3-glow)"/>

  <!-- L4 金属边框 (L1=5px) -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#nw3-bezel)" stroke-width="5"/>

  <!-- L3 无装饰环（L1-2无） -->

  <!-- L2 底盘 -->
  <circle cx="100" cy="100" r="79" fill="url(#nw3-face)"/>

  <!-- L1 核心符号: 单点萌芽 — 中心核+初生突触 -->
  <g transform="translate(0, 0)">
    <!-- 中心核（六边形细胞体） -->
    <polygon points="100,70 117,80 117,100 100,110 83,100 83,80"
             fill="url(#nw3-core)" stroke="#a5d6a7" stroke-width="1.5" stroke-opacity="0.5"/>
    <!-- 核仁 -->
    <circle cx="100" cy="90" r="5" fill="#c8e6c9" opacity="0.9"/>
    <circle cx="100" cy="90" r="2.5" fill="#ffffff" opacity="0.7"/>

    <!-- 初生突触：向上生长 -->
    <path d="M100 70 Q100 48 100 32" fill="none" stroke="#81c784" stroke-width="3.5" stroke-linecap="round"/>
    <!-- 突触末端的生长锥 -->
    <circle cx="100" cy="30" r="5" fill="none" stroke="#a5d6a7" stroke-width="2"/>
    <circle cx="100" cy="30" r="2.5" fill="#a5d6a7" opacity="0.8"/>

    <!-- 底部根丝（初生轴突，向下连接） -->
    <path d="M100 110 Q100 128 100 142" fill="none" stroke="#81c784" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- 根丝末端分支 -->
    <path d="M100 138 Q90 148 82 146" fill="none" stroke="#66bb6a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <path d="M100 138 Q110 148 118 146" fill="none" stroke="#66bb6a" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- 初生树突小芽（左右各一） -->
    <circle cx="82" cy="90" r="2.5" fill="#c8e6c9" opacity="0.5"/>
    <circle cx="118" cy="90" r="2.5" fill="#c8e6c9" opacity="0.5"/>
  </g>

  <!-- L0 表面高光 -->
  <ellipse cx="88" cy="48" rx="38" ry="19" fill="url(#nw3-shine)" transform="rotate(-15 88 48)"/>

  <!-- 粒子 L1=3颗 -->
  <circle cx="155" cy="40" r="1.8" fill="#a5d6a7" opacity="0.35"/>
  <circle cx="42"  cy="130" r="1.5" fill="#81c784" opacity="0.25"/>
  <circle cx="148" cy="148" r="1.2" fill="#a5d6a7" opacity="0.2"/>
</svg>
