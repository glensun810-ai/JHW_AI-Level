<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="萌新段位徽章">
  <defs>
    <radialGradient id="g1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#4caf50" stop-opacity="0.12"/>
      <stop offset="60%" stop-color="#2e7d32" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f1" cx="45%" cy="38%" r="62%">
      <stop offset="0%"  stop-color="#263a28"/><stop offset="55%" stop-color="#18261a"/>
      <stop offset="100%" stop-color="#0d140f"/>
    </radialGradient>
    <linearGradient id="b1" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%" stop-color="#7aaa7a"/><stop offset="30%" stop-color="#3d6b3d"/>
      <stop offset="55%" stop-color="#8fc08f"/><stop offset="80%" stop-color="#2a4d2a"/>
      <stop offset="100%" stop-color="#5c8a5c"/>
    </linearGradient>
    <linearGradient id="sh1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- 外光晕 -->
  <circle cx="100" cy="100" r="96" fill="url(#g1)"/>

  <!-- 金属边框 5px -->
  <circle cx="100" cy="100" r="84" fill="none" stroke="url(#b1)" stroke-width="5"/>

  <!-- 底盘 -->
  <circle cx="100" cy="100" r="79" fill="url(#f1)"/>

  <!-- ═══ 大脑轮廓（极淡，仅为内景提供容器感） ═══ -->
  <g transform="translate(100, 88)" opacity="0.3">
    <!-- 大脑外形：双半球+脑干 -->
    <path d="M-4,-40 C-30,-40 -44,-22 -42,-4 C-40,10 -32,22 -18,28
             L-6,30 L-6,38 L6,38 L6,30 L18,28
             C32,22 40,10 42,-4 C44,-22 30,-40 4,-40 Z"
          fill="none" stroke="#66bb6a" stroke-width="1.5"/>
    <!-- 中央沟 -->
    <line x1="0" y1="-36" x2="0" y2="28" stroke="#66bb6a" stroke-width="0.8"/>
  </g>

  <!-- ═══ L1 纯生物神经网络 ═══ -->
  <g transform="translate(100, 88)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 神经元树突：全曲线、不规则、有机分支 -->

    <!-- 左侧半球神经元 -->
    <path d="M-8,-20 Q-16,-28 -22,-24 Q-28,-18 -24,-10" stroke="#81c784" stroke-width="2" opacity="0.7"/>
    <path d="M-22,-24 Q-30,-32 -32,-26" stroke="#66bb6a" stroke-width="1.5" opacity="0.5"/>
    <path d="M-24,-10 Q-32,-6 -30,2 Q-26,6 -20,2" stroke="#81c784" stroke-width="1.8" opacity="0.6"/>
    <path d="M-20,2 Q-26,10 -22,16 Q-16,20 -10,14" stroke="#66bb6a" stroke-width="1.5" opacity="0.5"/>

    <!-- 右侧半球神经元 -->
    <path d="M8,-20 Q16,-28 22,-24 Q28,-18 24,-10" stroke="#81c784" stroke-width="2" opacity="0.7"/>
    <path d="M22,-24 Q30,-32 32,-26" stroke="#66bb6a" stroke-width="1.5" opacity="0.5"/>
    <path d="M24,-10 Q32,-6 30,2 Q26,6 20,2" stroke="#81c784" stroke-width="1.8" opacity="0.6"/>
    <path d="M20,2 Q26,10 22,16 Q16,20 10,14" stroke="#66bb6a" stroke-width="1.5" opacity="0.5"/>

    <!-- 胼胝体连接（左右半球间的弯曲桥接） -->
    <path d="M-8,-6 Q-4,-12 0,-12 Q4,-12 8,-6" stroke="#a5d6a7" stroke-width="1.5" opacity="0.5"/>

    <!-- 脑干下行 -->
    <path d="M-2,20 Q-4,28 -4,32 Q-2,38 0,38 Q2,38 4,32 Q4,28 2,20" stroke="#81c784" stroke-width="1.8" opacity="0.5"/>

    <!-- 神经节点（突触小结） -->
    <g fill="#a5d6a7">
      <circle cx="-24" cy="-10" r="2.5" opacity="0.7"/>
      <circle cx="24" cy="-10" r="2.5" opacity="0.7"/>
      <circle cx="-20" cy="2" r="2" opacity="0.6"/>
      <circle cx="20" cy="2" r="2" opacity="0.6"/>
      <circle cx="-10" cy="14" r="2" opacity="0.5"/>
      <circle cx="10" cy="14" r="2" opacity="0.5"/>
      <circle cx="0" cy="-12" r="2" opacity="0.5"/>
    </g>

    <!-- 微光核心 -->
    <circle cx="0" cy="-4" r="3" fill="#c8e6c9" opacity="0.7"/>
    <circle cx="0" cy="-4" r="1.5" fill="#fff" opacity="0.6"/>
  </g>

  <!-- 表面高光 -->
  <ellipse cx="88" cy="48" rx="38" ry="19" fill="url(#sh1)" transform="rotate(-15 88 48)"/>

  <!-- 粒子 L1=3 -->
  <circle cx="155" cy="40" r="1.8" fill="#a5d6a7" opacity="0.35"/>
  <circle cx="42" cy="130" r="1.5" fill="#81c784" opacity="0.25"/>
  <circle cx="148" cy="148" r="1.2" fill="#a5d6a7" opacity="0.2"/>
</svg>
