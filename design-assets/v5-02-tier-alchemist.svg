<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="炼金术士段位徽章">
  <defs>
    <radialGradient id="g6" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ab47bc" stop-opacity="0.18"/>
      <stop offset="50%" stop-color="#6a1b9a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f6" cx="45%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#201835"/><stop offset="55%" stop-color="#140d22"/>
      <stop offset="100%" stop-color="#0a0612"/>
    </radialGradient>
    <linearGradient id="b6" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%" stop-color="#ce93d8"/><stop offset="25%" stop-color="#7b1fa2"/>
      <stop offset="50%" stop-color="#e1bee7"/><stop offset="75%" stop-color="#4a148c"/>
      <stop offset="100%" stop-color="#ab47bc"/>
    </linearGradient>
    <linearGradient id="sh6" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bloom6">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 外光晕 -->
  <circle cx="100" cy="100" r="96" fill="url(#g6)"/>

  <!-- 装饰环 L6 -->
  <circle cx="100" cy="100" r="88" fill="none" stroke="#ab47bc" stroke-width="1.2" stroke-opacity="0.25" stroke-dasharray="2.5 14"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#e1bee7" stroke-width="0.8" stroke-opacity="0.15" stroke-dasharray="2.5 14" stroke-dashoffset="6"/>

  <!-- 金属边框 7px -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="url(#b6)" stroke-width="7"/>

  <!-- 底盘 -->
  <circle cx="100" cy="100" r="74" fill="url(#f6)"/>

  <!-- ═══ 大脑轮廓（稍强于L1，暗示结构增长） ═══ -->
  <g transform="translate(100, 88)" opacity="0.4">
    <path d="M-4,-42 C-32,-42 -46,-22 -44,-2 C-42,12 -34,24 -18,30
             L-6,32 L-6,40 L6,40 L6,32 L18,30
             C34,24 42,12 44,-2 C46,-22 32,-42 4,-42 Z"
          fill="none" stroke="#ab47bc" stroke-width="1.5"/>
    <line x1="0" y1="-38" x2="0" y2="30" stroke="#ab47bc" stroke-width="0.8"/>
  </g>

  <!-- ═══ L6 融合态：生物神经网络 + 硅基电路 = 交织生长 ═══ -->
  <g transform="translate(100, 88)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ── 生物神经部分（左半球为主，保留弧线树突） ── -->
    <path d="M-8,-22 Q-18,-32 -26,-26 Q-32,-18 -26,-8" stroke="#ce93d8" stroke-width="2.2" opacity="0.65"/>
    <path d="M-26,-26 Q-34,-36 -38,-28" stroke="#ab47bc" stroke-width="1.5" opacity="0.45"/>
    <path d="M-26,-8 Q-36,-2 -34,6 Q-28,10 -22,6" stroke="#ce93d8" stroke-width="1.8" opacity="0.55"/>
    <path d="M-22,6 Q-30,14 -26,20 Q-18,24 -12,18" stroke="#ab47bc" stroke-width="1.5" opacity="0.45"/>

    <!-- ── 硅基电路部分（右半球为主，直角+45°走线+平行线） ── -->
    <!-- PCB风格走线 -->
    <path d="M10,-24 L22,-24 L28,-18 L28,-8" stroke="#e1bee7" stroke-width="2" opacity="0.6"/>
    <path d="M16,-30 L22,-30 L28,-24" stroke="#ce93d8" stroke-width="1.5" opacity="0.45"/>
    <!-- 平行总线 -->
    <path d="M24,-4 L34,-4 L38,2 L38,10" stroke="#e1bee7" stroke-width="1.8" opacity="0.55"/>
    <path d="M20,0 L28,0 L32,4 L32,14" stroke="#ce93d8" stroke-width="1.5" opacity="0.5"/>
    <!-- 直角折线 -->
    <path d="M18,12 L24,12 L28,8 L28,2" stroke="#e1bee7" stroke-width="1.8" opacity="0.5"/>

    <!-- ── 融合区（中线附近，生物线路和电路交织） ── -->
    <!-- 一条弧线与一条直角线在中线交汇 -->
    <path d="M-4,-12 Q-2,-16 2,-16 Q6,-16 8,-12" stroke="#e1bee7" stroke-width="1.8" opacity="0.6"/>
    <path d="M-2,-8 L2,-8 L4,-6 L4,0" stroke="#e1bee7" stroke-width="1.5" opacity="0.5"/>
    <!-- 生物线从左边跨越中线接触电路节点 -->
    <path d="M-12,-4 Q-6,-8 2,-8" stroke="#ce93d8" stroke-width="1.8" opacity="0.55"/>

    <!-- ── 脑干区：电路下行 ── -->
    <path d="M-2,20 L-2,26 L-4,30 L-4,36" stroke="#ab47bc" stroke-width="1.8" opacity="0.5"/>
    <path d="M2,20 L2,26 L4,30 L4,36" stroke="#e1bee7" stroke-width="1.8" opacity="0.5"/>

    <!-- ── 神经节点 + 电路过孔 ── -->
    <!-- 生物突触节点 -->
    <g fill="#ce93d8">
      <circle cx="-26" cy="-8" r="2.5" opacity="0.6"/>
      <circle cx="-22" cy="6" r="2.2" opacity="0.55"/>
      <circle cx="-12" cy="18" r="2" opacity="0.5"/>
    </g>
    <!-- 电路过孔（方形焊点风格） -->
    <g fill="#e1bee7">
      <rect x="20" y="-26" width="4" height="4" rx="1" opacity="0.6"/>
      <rect x="26" y="-10" width="4" height="4" rx="1" opacity="0.55"/>
      <rect x="36" cy="8" width="4" height="4" rx="1" opacity="0.5"/>
    </g>
    <!-- 融合区节点（圆形+方形混合，正在过渡） -->
    <circle cx="2" cy="-16" r="2.5" fill="#e1bee7" opacity="0.65"/>
    <rect x="2" y="-2" width="4" height="4" rx="1.5" fill="#ce93d8" opacity="0.55"/>

    <!-- 中心融合光核（比L1亮） -->
    <circle cx="0" cy="-4" r="6" fill="#e1bee7" opacity="0.25" filter="url(#bloom6)"/>
    <circle cx="0" cy="-4" r="3" fill="#e1bee7" opacity="0.75"/>
    <circle cx="0" cy="-4" r="1.5" fill="#fff" opacity="0.85"/>
  </g>

  <!-- 表面高光 -->
  <ellipse cx="86" cy="46" rx="36" ry="18" fill="url(#sh6)" transform="rotate(-15 86 46)"/>

  <!-- 粒子 L6=9 -->
  <g fill="#e1bee7">
    <circle cx="28" cy="88" r="1.8" opacity="0.4"/>
    <circle cx="168" cy="52" r="2.2" opacity="0.45"/>
    <circle cx="172" cy="105" r="1.5" opacity="0.3"/>
    <circle cx="155" cy="145" r="1.8" opacity="0.28"/>
    <circle cx="42" cy="42" r="1.8" opacity="0.35"/>
    <circle cx="162" cy="28" r="1.5" opacity="0.28"/>
    <circle cx="35" cy="132" r="1.5" opacity="0.3"/>
    <circle cx="26" cy="58" r="1.2" opacity="0.22"/>
    <circle cx="148" cy="170" r="1.6" opacity="0.22"/>
  </g>
</svg>
