<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="无界段位徽章">
  <defs>
    <radialGradient id="bl3-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffd700" stop-opacity="0.25"/>
      <stop offset="35%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#ff8f00" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bl3-face" cx="45%" cy="38%" r="62%">
      <stop offset="0%"  stop-color="#2a2000" />
      <stop offset="55%" stop-color="#191200" />
      <stop offset="100%" stop-color="#0d0900" />
    </radialGradient>
    <linearGradient id="bl3-bezel" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%"   stop-color="#ffe082" />
      <stop offset="22%"  stop-color="#ffd700" />
      <stop offset="42%"  stop-color="#ffffff" />
      <stop offset="55%"  stop-color="#ffd700" />
      <stop offset="72%"  stop-color="#b8860b" />
      <stop offset="100%" stop-color="#ffc107" />
    </linearGradient>
    <radialGradient id="bl3-core" cx="48%" cy="42%" r="48%">
      <stop offset="0%"   stop-color="#ffffff" />
      <stop offset="18%"  stop-color="#fff9c4" />
      <stop offset="45%"  stop-color="#ffd700" />
      <stop offset="75%"  stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#e65100" />
    </radialGradient>
    <linearGradient id="bl3-shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bl3-bloom">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- L5 外光晕（双层，最深） -->
  <circle cx="100" cy="100" r="96" fill="url(#bl3-glow)"/>
  <circle cx="100" cy="100" r="64" fill="none" stroke="#ffd700" stroke-width="2.5" stroke-opacity="0.06"/>

  <!-- L4 双层装饰环 -->
  <!-- 外铭文环 -->
  <circle cx="100" cy="100" r="91" fill="none" stroke="#ffd700" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="2 10"/>
  <circle cx="100" cy="100" r="91" fill="none" stroke="#ffffff" stroke-width="0.5" stroke-opacity="0.12" stroke-dasharray="2 10" stroke-dashoffset="5"/>
  <!-- 8个方向芒尖 -->
  <g fill="#ffd700" opacity="0.15" filter="url(#bl3-bloom)">
    <polygon points="100,2 96,14 100,22 104,14"/>
    <polygon points="100,198 96,186 100,178 104,186"/>
    <polygon points="2,100 14,96 22,100 14,104"/>
    <polygon points="198,100 186,96 178,100 186,104"/>
    <polygon points="30,30 37,37 42,35 41,43 35,48 28,43"/>
    <polygon points="170,30 163,37 158,35 159,43 165,48 172,43"/>
    <polygon points="30,170 37,163 42,158 43,164 48,170 43,175"/>
    <polygon points="170,170 163,163 158,158 159,164 165,170 172,175"/>
  </g>

  <!-- L3 金属边框 (L8=8px) -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#bl3-bezel)" stroke-width="8"/>
  <circle cx="100" cy="100" r="73" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.08"/>
  <circle cx="100" cy="100" r="83" fill="none" stroke="#ffffff" stroke-width="0.8" opacity="0.06"/>

  <!-- L2 底盘 -->
  <circle cx="100" cy="100" r="72" fill="url(#bl3-face)"/>

  <!-- L1 核心符号: 终极曼荼罗 — 斐波那契螺旋 + 电路分形 + 中心虚空 -->
  <g transform="translate(100, 96)" filter="url(#bl3-bloom)">
    <!-- 最外层曼荼罗环：几何电路分形（正十二边形节点连接） -->
    <g opacity="0.35">
      <!-- 12个外层节点 -->
      <g fill="none" stroke="#ffd700" stroke-width="0.8">
        <circle cx="0" cy="-56" r="2.5"/><circle cx="28" cy="-48.5" r="2.5"/>
        <circle cx="48.5" cy="-28" r="2.5"/><circle cx="56" cy="0" r="2.5"/>
        <circle cx="48.5" cy="28" r="2.5"/><circle cx="28" cy="48.5" r="2.5"/>
        <circle cx="0" cy="56" r="2.5"/><circle cx="-28" cy="48.5" r="2.5"/>
        <circle cx="-48.5" cy="28" r="2.5"/><circle cx="-56" cy="0" r="2.5"/>
        <circle cx="-48.5" cy="-28" r="2.5"/><circle cx="-28" cy="-48.5" r="2.5"/>
      </g>
      <!-- 节点间连接（部分连接形成电路网络） -->
      <g stroke="#f59e0b" stroke-width="0.5" fill="none" opacity="0.5">
        <line x1="0" y1="-56" x2="28" y2="-48.5"/><line x1="28" y1="-48.5" x2="48.5" y2="-28"/>
        <line x1="48.5" y1="-28" x2="56" y2="0"/><line x1="56" y1="0" x2="48.5" y2="28"/>
        <line x1="48.5" y1="28" x2="28" y2="48.5"/><line x1="28" y1="48.5" x2="0" y2="56"/>
        <line x1="0" y1="56" x2="-28" y2="48.5"/><line x1="-28" y1="48.5" x2="-48.5" y2="28"/>
        <line x1="-48.5" y1="28" x2="-56" y2="0"/><line x1="-56" y1="0" x2="-48.5" y2="-28"/>
        <line x1="-48.5" y1="-28" x2="-28" y2="-48.5"/><line x1="-28" y1="-48.5" x2="0" y2="-56"/>
        <!-- 跨中心连接 -->
        <line x1="0" y1="-56" x2="0" y2="56"/><line x1="-56" y1="0" x2="56" y2="0"/>
        <line x1="-48.5" y1="-28" x2="48.5" y2="28"/><line x1="48.5" y1="-28" x2="-48.5" y2="28"/>
      </g>
    </g>

    <!-- 中层：斐波那契螺旋（4条，旋转对称） -->
    <g fill="none" stroke="#ffd700" stroke-width="1.8" stroke-linecap="round" opacity="0.5">
      <!-- 螺旋1 -->
      <path d="M0 0 Q8 -4 12 -12 Q16 -20 10 -30 Q4 -38 -4 -42"/>
      <!-- 螺旋2 (旋转90°) -->
      <path d="M0 0 Q4 8 12 12 Q20 16 30 10 Q38 4 42 -4" transform="rotate(90)"/>
      <!-- 螺旋3 (旋转180°) -->
      <path d="M0 0 Q-8 4 -12 12 Q-16 20 -10 30 Q-4 38 4 42" transform="rotate(180)"/>
      <!-- 螺旋4 (旋转270°) -->
      <path d="M0 0 Q-4 -8 -12 -12 Q-20 -16 -30 -10 Q-38 -4 -42 4" transform="rotate(270)"/>
    </g>

    <!-- 内层：黄金比例同心环 -->
    <circle cx="0" cy="0" r="30" fill="none" stroke="#ffd700" stroke-width="1.2" opacity="0.3"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.4"/>
    <circle cx="0" cy="0" r="8" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>

    <!-- 中心虚空（Enso式留白 + 白热光点） -->
    <circle cx="0" cy="0" r="6" fill="url(#bl3-core)" opacity="0.3"/>
    <circle cx="0" cy="0" r="3" fill="#ffffff" opacity="0.7"/>
    <circle cx="0" cy="0" r="1.2" fill="#ffffff" opacity="0.95"/>

    <!-- 虚空外围的"存在环"（量子涨落感） -->
    <circle cx="0" cy="0" r="6" fill="none" stroke="#ffffff" stroke-width="0.6" opacity="0.5"/>
  </g>

  <!-- L0 表面高光 -->
  <ellipse cx="84" cy="44" rx="34" ry="17" fill="url(#bl3-shine)" transform="rotate(-15 84 44)"/>

  <!-- 粒子 L8=16颗 + 白金星点 -->
  <g fill="#ffd700">
    <circle cx="26" cy="68" r="2.2" opacity="0.5"/>
    <circle cx="176" cy="40" r="2.8" opacity="0.55"/>
    <circle cx="30" cy="132" r="1.8" opacity="0.38"/>
    <circle cx="172" cy="135" r="2.2" opacity="0.42"/>
    <circle cx="22" cy="98" r="1.5" opacity="0.28"/>
    <circle cx="180" cy="92" r="1.8" opacity="0.32"/>
    <circle cx="38" cy="168" r="1.6" opacity="0.28"/>
    <circle cx="162" cy="170" r="1.8" opacity="0.32"/>
    <circle cx="48" cy="36" r="1.5" opacity="0.32"/>
    <circle cx="150" cy="30" r="1.8" opacity="0.38"/>
    <circle cx="16" cy="50" r="1.2" opacity="0.22"/>
    <circle cx="186" cy="58" r="1.5" opacity="0.24"/>
    <circle cx="44" cy="152" r="1.2" opacity="0.2"/>
    <circle cx="157" cy="152" r="1.5" opacity="0.24"/>
    <circle cx="10" cy="78" r="1" opacity="0.18"/>
    <circle cx="192" cy="112" r="1.2" opacity="0.2"/>
  </g>
  <!-- 白金星点（最高段位专属） -->
  <g fill="#ffffff">
    <circle cx="172" cy="56" r="1.2" opacity="0.65"/>
    <circle cx="28" cy="50" r="1" opacity="0.55"/>
    <circle cx="112" cy="24" r="1.5" opacity="0.5"/>
    <circle cx="88" cy="176" r="1.2" opacity="0.4"/>
    <circle cx="58" cy="26" r="0.8" opacity="0.35"/>
    <circle cx="146" cy="174" r="0.8" opacity="0.35"/>
  </g>
</svg>
