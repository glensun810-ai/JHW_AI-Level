<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="无界段位徽章">
  <defs>
    <radialGradient id="g8" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffd700" stop-opacity="0.25"/>
      <stop offset="35%" stop-color="#f59e0b" stop-opacity="0.08"/>
      <stop offset="70%" stop-color="#ff8f00" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#0d1b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f8" cx="45%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#2a2000"/><stop offset="55%" stop-color="#191200"/>
      <stop offset="100%" stop-color="#0d0900"/>
    </radialGradient>
    <linearGradient id="b8" x1="5%" y1="5%" x2="95%" y2="95%">
      <stop offset="0%" stop-color="#ffe082"/><stop offset="22%" stop-color="#ffd700"/>
      <stop offset="42%" stop-color="#ffffff"/><stop offset="55%" stop-color="#ffd700"/>
      <stop offset="72%" stop-color="#b8860b"/><stop offset="100%" stop-color="#ffc107"/>
    </linearGradient>
    <radialGradient id="core8" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff"/><stop offset="30%" stop-color="#fff9c4"/>
      <stop offset="65%" stop-color="#ffd700"/><stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sh8" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <filter id="bloom8">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 外光晕双层 -->
  <circle cx="100" cy="100" r="96" fill="url(#g8)"/>
  <circle cx="100" cy="100" r="64" fill="none" stroke="#ffd700" stroke-width="2.5" stroke-opacity="0.06"/>

  <!-- 芒尖 8方向 -->
  <g fill="#ffd700" opacity="0.15" filter="url(#bloom8)">
    <polygon points="100,2 96,14 100,22 104,14"/>
    <polygon points="100,198 96,186 100,178 104,186"/>
    <polygon points="2,100 14,96 22,100 14,104"/>
    <polygon points="198,100 186,96 178,100 186,104"/>
    <polygon points="30,30 37,37 42,35 41,43 35,48 28,43"/>
    <polygon points="170,30 163,37 158,35 159,43 165,48 172,43"/>
    <polygon points="30,170 37,163 42,158 43,164 48,170 43,175"/>
    <polygon points="170,170 163,163 158,158 159,164 165,170 172,175"/>
  </g>

  <!-- 铭文环 -->
  <circle cx="100" cy="100" r="91" fill="none" stroke="#ffd700" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="2 10"/>
  <circle cx="100" cy="100" r="91" fill="none" stroke="#fff" stroke-width="0.5" stroke-opacity="0.12" stroke-dasharray="2 10" stroke-dashoffset="5"/>

  <!-- 金属边框 8px -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="url(#b8)" stroke-width="8"/>
  <circle cx="100" cy="100" r="73" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.08"/>
  <circle cx="100" cy="100" r="83" fill="none" stroke="#fff" stroke-width="0.8" opacity="0.06"/>

  <!-- 底盘 -->
  <circle cx="100" cy="100" r="72" fill="url(#f8)"/>

  <!-- ═══ 大脑轮廓（发光，半透明，正在"升华"） ═══ -->
  <g transform="translate(100, 88)" opacity="0.5">
    <path d="M-4,-44 C-34,-44 -48,-22 -46,-2 C-44,14 -36,26 -18,32
             L-6,34 L-6,42 L6,42 L6,34 L18,32
             C36,26 44,14 46,-2 C48,-22 34,-44 4,-44 Z"
          fill="none" stroke="#ffd700" stroke-width="1.8" filter="url(#bloom8)"/>
    <!-- 中央沟变成光缝 -->
    <line x1="0" y1="-40" x2="0" y2="32" stroke="#fff" stroke-width="0.6" opacity="0.4"/>
    <!-- 轮廓外围微光环 -->
    <path d="M-4,-44 C-34,-44 -48,-22 -46,-2 C-44,14 -36,26 -18,32
             L-6,34 L-6,42 L6,42 L6,34 L18,32
             C36,26 44,14 46,-2 C48,-22 34,-44 4,-44 Z"
          fill="none" stroke="#fff" stroke-width="3" opacity="0.08"/>
  </g>

  <!-- ═══ L8 回归纯神经网络（超越态——无电路，纯神经，但比L1更完美） ═══ -->
  <g transform="translate(100, 88)" fill="none" stroke-linecap="round" stroke-linejoin="round">

    <!-- ── 内核光晕 ── -->
    <circle cx="0" cy="-4" r="16" fill="url(#core8)" opacity="0.18" filter="url(#bloom8)"/>

    <!-- ── 全弧线神经网络：左右对称+多层环流 ── -->

    <!-- 第1层：中心蝶形环（胼胝体区，左右半球交汇点） -->
    <path d="M-6,-4 Q-4,-10 0,-10 Q4,-10 6,-4 Q4,2 0,2 Q-4,2 -6,-4 Z"
          stroke="#fff" stroke-width="2.2" opacity="0.8"/>
    <circle cx="0" cy="-4" r="3" fill="#fff" opacity="0.95" filter="url(#bloom8)"/>
    <circle cx="0" cy="-4" r="1.2" fill="#fff"/>

    <!-- 第2层：内环神经网络（左右各3条主分支，完美弧线） -->
    <!-- 左上支 -->
    <path d="M-4,-10 Q-14,-18 -20,-14 Q-28,-10 -24,-2" stroke="#ffe082" stroke-width="2" opacity="0.65"/>
    <path d="M-20,-14 Q-26,-22 -30,-16 Q-34,-8 -28,-2" stroke="#ffd700" stroke-width="1.5" opacity="0.45"/>
    <path d="M-14,-14 Q-18,-22 -16,-28 Q-12,-32 -8,-26" stroke="#ffe082" stroke-width="1.5" opacity="0.5"/>
    <!-- 右上支 -->
    <path d="M4,-10 Q14,-18 20,-14 Q28,-10 24,-2" stroke="#ffe082" stroke-width="2" opacity="0.65"/>
    <path d="M20,-14 Q26,-22 30,-16 Q34,-8 28,-2" stroke="#ffd700" stroke-width="1.5" opacity="0.45"/>
    <path d="M14,-14 Q18,-22 16,-28 Q12,-32 8,-26" stroke="#ffe082" stroke-width="1.5" opacity="0.5"/>
    <!-- 左下支 -->
    <path d="M-4,2 Q-14,10 -20,6 Q-28,2 -24,-4" stroke="#ffe082" stroke-width="2" opacity="0.65"/>
    <path d="M-20,6 Q-26,14 -30,8 Q-32,2 -26,-4" stroke="#ffd700" stroke-width="1.5" opacity="0.45"/>
    <!-- 右下支 -->
    <path d="M4,2 Q14,10 20,6 Q28,2 24,-4" stroke="#ffe082" stroke-width="2" opacity="0.65"/>
    <path d="M20,6 Q26,14 30,8 Q32,2 26,-4" stroke="#ffd700" stroke-width="1.5" opacity="0.45"/>

    <!-- 第3层：中环分支（向外扩展，延伸至大脑轮廓边缘） -->
    <!-- 左外弧 -->
    <path d="M-24,-2 Q-34,-6 -38,0 Q-42,8 -36,14 Q-28,20 -22,12" stroke="#ffd700" stroke-width="1.8" opacity="0.5"/>
    <path d="M-28,-2 Q-36,-12 -40,-6 Q-44,2 -38,8" stroke="#f59e0b" stroke-width="1.3" opacity="0.35"/>
    <!-- 右外弧 -->
    <path d="M24,-2 Q34,-6 38,0 Q42,8 36,14 Q28,20 22,12" stroke="#ffd700" stroke-width="1.8" opacity="0.5"/>
    <path d="M28,-2 Q36,-12 40,-6 Q44,2 38,8" stroke="#f59e0b" stroke-width="1.3" opacity="0.35"/>

    <!-- 第4层：外层回流弧（形成闭环，暗示"无限"） -->
    <path d="M-36,14 Q-44,20 -42,28 Q-36,34 -28,30 Q-20,26 -18,18"
          stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>
    <path d="M36,14 Q44,20 42,28 Q36,34 28,30 Q20,26 18,18"
          stroke="#f59e0b" stroke-width="1.5" opacity="0.35"/>

    <!-- 第5层：顶部冠弧（跨左右半球的冠冕式弧线） -->
    <path d="M-16,-28 Q-10,-40 0,-42 Q10,-40 16,-28"
          stroke="#fff" stroke-width="1.5" opacity="0.4"/>
    <path d="M-22,-22 Q-14,-38 0,-40 Q14,-38 22,-22"
          stroke="#ffd700" stroke-width="1.2" opacity="0.3"/>

    <!-- ── 脑干：流线型下行，不再有"电路"的任何痕迹 ── -->
    <path d="M-2,18 Q-4,26 -3,34 Q-1,40 0,42 Q1,40 3,34 Q4,26 2,18"
          stroke="#ffe082" stroke-width="2" opacity="0.55"/>
    <path d="M-4,26 Q-6,32 -5,38" stroke="#ffd700" stroke-width="1.2" opacity="0.35"/>
    <path d="M4,26 Q6,32 5,38" stroke="#ffd700" stroke-width="1.2" opacity="0.35"/>

    <!-- ── 神经节点：全圆形，无方形过孔，比L1更密集 ── -->
    <g fill="#ffe082">
      <circle cx="-24" cy="-2" r="2.5" opacity="0.7"/>
      <circle cx="24" cy="-2" r="2.5" opacity="0.7"/>
      <circle cx="-36" cy="14" r="2.2" opacity="0.55"/>
      <circle cx="36" cy="14" r="2.2" opacity="0.55"/>
      <circle cx="-16" cy="-28" r="2" opacity="0.5"/>
      <circle cx="16" cy="-28" r="2" opacity="0.5"/>
      <circle cx="0" cy="-42" r="2" opacity="0.45"/>
      <circle cx="-28" cy="8" r="2.2" opacity="0.5"/>
      <circle cx="28" cy="8" r="2.2" opacity="0.5"/>
      <circle cx="-18" cy="18" r="1.8" opacity="0.45"/>
      <circle cx="18" cy="18" r="1.8" opacity="0.45"/>
    </g>

    <!-- 白金星点（终极段位专属） -->
    <g fill="#fff">
      <circle cx="-30" cy="-8" r="1.2" opacity="0.7"/>
      <circle cx="30" cy="-8" r="1.2" opacity="0.7"/>
      <circle cx="-12" cy="-36" r="1" opacity="0.6"/>
      <circle cx="12" cy="-36" r="1" opacity="0.6"/>
      <circle cx="0" cy="28" r="1.5" opacity="0.5"/>
    </g>

    <!-- ── 溢出射线：从大脑轮廓向外辐射，无电路痕迹 ── -->
    <g stroke="#ffd700" stroke-width="0.8" opacity="0.25" filter="url(#bloom8)">
      <line x1="-24" y1="-28" x2="-40" y2="-46"/>
      <line x1="24" y1="-28" x2="40" y2="-46"/>
      <line x1="-42" y1="8" x2="-58" y2="12"/>
      <line x1="42" y1="8" x2="58" y2="12"/>
      <line x1="0" y1="-44" x2="0" y2="-58"/>
    </g>
  </g>

  <!-- 表面高光 -->
  <ellipse cx="84" cy="44" rx="34" ry="17" fill="url(#sh8)" transform="rotate(-15 84 44)"/>

  <!-- 粒子 L8=16 -->
  <g fill="#ffd700">
    <circle cx="26" cy="68" r="2.2" opacity="0.5"/><circle cx="176" cy="40" r="2.8" opacity="0.55"/>
    <circle cx="30" cy="132" r="1.8" opacity="0.38"/><circle cx="172" cy="135" r="2.2" opacity="0.42"/>
    <circle cx="22" cy="98" r="1.5" opacity="0.28"/><circle cx="180" cy="92" r="1.8" opacity="0.32"/>
    <circle cx="38" cy="168" r="1.6" opacity="0.28"/><circle cx="162" cy="170" r="1.8" opacity="0.32"/>
    <circle cx="48" cy="36" r="1.5" opacity="0.32"/><circle cx="150" cy="30" r="1.8" opacity="0.38"/>
    <circle cx="16" cy="50" r="1.2" opacity="0.22"/><circle cx="186" cy="58" r="1.5" opacity="0.24"/>
    <circle cx="44" cy="152" r="1.2" opacity="0.2"/><circle cx="157" cy="152" r="1.5" opacity="0.24"/>
    <circle cx="10" cy="78" r="1" opacity="0.18"/><circle cx="192" cy="112" r="1.2" opacity="0.2"/>
  </g>
  <g fill="#fff">
    <circle cx="172" cy="56" r="1.2" opacity="0.65"/><circle cx="28" cy="50" r="1" opacity="0.55"/>
    <circle cx="112" cy="24" r="1.5" opacity="0.5"/><circle cx="88" cy="176" r="1.2" opacity="0.4"/>
  </g>
</svg>
